services:
  subtitle-web:
    build: .
    image: subtitle-modal-web:latest
    container_name: subtitle-modal-web
    restart: unless-stopped
    ports:
      - "8898:8898"
    volumes:
      - ./media:/mnt/media
      - ./output:/output
      - ./cache:/cache
      - ./config:/config
    environment:
      MODAL_TOKEN_ID: ${MODAL_TOKEN_ID}
      MODAL_TOKEN_SECRET: ${MODAL_TOKEN_SECRET}
      HF_TOKEN: ${HF_TOKEN:-}
      APP_PORT: "8898"
      DEFAULT_GPU: "T4"
      DEFAULT_MODEL: "chickenrice"
      REPO_BRANCH: "v1.7"
      DEFAULT_FORMATS: "srt"
      WATCH_DIR: "/mnt/media"
      DEFAULT_MOVE_TARGET_DIR: ""
